defaults:
  - base_config
  - encoder: transformer
  - decoder: transformer
  - _self_

train:
  batch_size: 128
  epochs: 10
  lr: 0.0005

data:
  PAD: 0
  MAX_LEN: 14
  NUM_PREFIXES: 20
  src_vocab_size: 5000
  trg_vocab_size: 3000

